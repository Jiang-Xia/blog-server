# 管理子域名 https 服务
server {
    # certbot设置自动证书会自动配置的
    listen 443 ssl http2;
    server_name admin.jiang-xia.top;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    ssl_certificate /etc/letsencrypt/live/jiang-xia.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jiang-xia.top/privkey.pem; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


    root /;
    include /etc/nginx/default.d/*.conf;

    location / {
        alias /opt/jxapp/front/blog-admin/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /admin/zone-admin/ {
        alias /opt/jxapp/front/zone-admin/;
        index index.html;
        try_files $uri $uri/ /admin/zone-admin/index.html;
    }
    location /test-front/ {
        alias /opt/jxapp/front/test-front/;
        index index.html;
        try_files $uri $uri/ /test-front/index.html;
    }
    error_page 404 /404.html;
    location = /40x.html { }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { }
}

# 管理子域名 http 重定向
server {
    listen 80;
    server_name admin.jiang-xia.top;
    return 301 https://$host$request_uri;
}